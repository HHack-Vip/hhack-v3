<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEMS MINES VIP</title>
    <style>
        :root { --gold: #ffd700; --blue: #00d4ff; --bg: #000c18; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .panel { background: rgba(0, 20, 40, 0.9); border: 2px solid var(--gold); padding: 30px; border-radius: 20px; text-align: center; width: 300px; box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
        .title { font-size: 28px; color: var(--gold); margin-bottom: 25px; font-weight: bold; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-trial { background: transparent; border: 2px solid white; color: white; }
        .btn-vip { background: linear-gradient(to bottom, #ffd700, #b8860b); color: black; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid var(--blue); background: #000; color: var(--blue); text-align: center; box-sizing: border-box; }
        .hidden { display: none; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; }
        .cell { width: 50px; height: 50px; background: #0a1a2a; border: 1px solid #1a3a5a; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>

    <div id="screen-1" class="panel">
        <div class="title">GEMS MINES VIP</div>
        <button class="btn-trial" onclick="next(2)">تجربة مجانية</button>
        <button class="btn-vip" onclick="vipPrompt()">دخول VIP 🐉</button>
    </div>

    <div id="screen-2" class="panel hidden">
        <div class="title">تحقق من الهوية</div>
        <input type="text" id="idInput" placeholder="ادخل ID اللاعب">
        <button class="btn-vip" onclick="checkID()">استمرار</button>
    </div>

    <div id="screen-3" class="panel hidden">
        <div class="title">نظام التحليل</div>
        <input type="password" id="passInput" placeholder="ادخل كود التفعيل">
        <button class="btn-vip" onclick="checkPass()">تفعيل السيرفر</button>
    </div>

    <div id="screen-game" class="panel hidden" style="width: 320px;">
        <div class="title" style="font-size: 20px;">تحليل الشبكة الحالية</div>
        <div class="grid" id="grid"></div>
        <p style="margin-top: 15px;">💎: <span id="score">0</span> | 💣: <span id="bombs">0</span></p>
        <button class="btn-trial" onclick="location.reload()">إعادة فحص</button>
    </div>

    <script>
        const allowedIDs = ["1658237633", "1002075"];
        function next(s) { 
            document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
            document.getElementById('screen-' + s).classList.remove('hidden');
        }
        function vipPrompt() {
            let p = prompt("ادخل باسورد VIP:");
            if(p === "102545") { showGame(); } else { alert("خطأ في الباسورد"); }
        }
        function checkID() {
            let id = document.getElementById('idInput').value;
            if(allowedIDs.includes(id)) { next(3); } else { alert("ID غير مسجل"); }
        }
        function checkPass() {
            if(document.getElementById('passInput').value === "15711") { showGame(); } else { alert("كود التفعيل خطأ"); }
        }
        function showGame() {
            document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
            document.getElementById('screen-game').classList.remove('hidden');
            const g = document.getElementById('grid');
            const bombPositions = [2, 7, 12, 18];
            for(let i=0; i<25; i++) {
                let c = document.createElement('div');
                c.className = 'cell';
                c.onclick = () => {
                    if(c.innerHTML !== "") return;
                    if(bombPositions.includes(i)) {
                        c.innerHTML = "💣"; c.style.background = "#400";
                        document.getElementById('bombs').innerText = "1";
                    } else {
                        c.innerHTML = "💎"; c.style.background = "#046";
                        let s = document.getElementById('score');
                        s.innerText = parseInt(s.innerText) + 1;
                    }
                };
                g.appendChild(c);
            }
        }
    </script>
</body>
</html>
