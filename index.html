<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM ANALYZER V3</title>
    <style>
        body { background: #00050a; color: #00d4ff; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .box { border: 1px solid #00d4ff; padding: 20px; border-radius: 15px; background: rgba(0,20,40,0.9); width: 300px; }
        input { width: 90%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #00d4ff; color: #00d4ff; text-align: center; }
        button { width: 100%; padding: 10px; background: #00d4ff; color: #000; border: none; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 10px; }
        .cell { width: 50px; height: 50px; background: #0a1a2a; border: 1px solid #1a3a5a; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="login" class="box">
        <h2>SECURITY CHECK</h2>
        <input type="password" id="pass" placeholder="ACCESS KEY">
        <button onclick="checkPass()">DECRYPT SYSTEM</button>
    </div>
    <div id="id-screen" class="box hidden">
        <h2>USER VALIDATION</h2>
        <input type="text" id="userid" placeholder="ENTER ID">
        <button onclick="checkID()">CONNECT</button>
    </div>
    <div id="game" class="box hidden">
        <h3>SERVER ANALYSIS</h3>
        <div class="grid" id="grid"></div>
        <button onclick="location.reload()" style="margin-top:10px">RE-SCAN</button>
    </div>

    <script>
        const ids = ["1658237633", "15711", "admin"];
        function checkPass() { if(document.getElementById('pass').value === "15711") { document.getElementById('login').classList.add('hidden'); document.getElementById('id-screen').classList.remove('hidden'); } else alert("WRONG KEY"); }
        function checkID() { if(ids.includes(document.getElementById('userid').value)) { document.getElementById('id-screen').classList.add('hidden'); document.getElementById('game').classList.remove('hidden'); makeGrid(); } else alert("ID NOT FOUND"); }
        function makeGrid() { const g = document.getElementById('grid'); for(let i=0; i<25; i++) { let c = document.createElement('div'); c.className = 'cell'; c.onclick = () => { c.innerHTML = [2,7,12,18].includes(i) ? '💣' : '💎'; c.style.background = [2,7,12,18].includes(i) ? '#400' : '#046'; }; g.appendChild(c); } }
    </script>
</body>
</html>
