<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEMS MINES VIP PRO</title>
    <style>
        :root { --gold: #ffd700; --blue: #00d4ff; --dark-bg: #000b14; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: radial-gradient(circle, #001f3f 0%, #000 100%); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* الحاوية الرئيسية بتأثير زجاجي 3D */
        .container { background: rgba(0, 15, 30, 0.9); border: 2px solid var(--gold); padding: 40px 30px; border-radius: 30px; text-align: center; width: 340px; box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,215,0,0.1); transform: perspective(1000px); animation: fadeIn 0.5s ease-out; }
        
        .title { font-size: 26px; color: var(--gold); margin-bottom: 30px; font-weight: 900; text-shadow: 0 0 15px rgba(255, 215, 0, 0.5); letter-spacing: 1px; }

        /* أزرار احترافية 3D */
        .btn-3d { width: 100%; padding: 16px; margin: 15px 0; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 18px; transition: all 0.2s; position: relative; display: block; text-decoration: none; }
        .btn-gold { background: linear-gradient(145deg, #ffd700, #b8860b); color: #000; box-shadow: 0 8px 0 #8a6d00, 0 15px 25px rgba(0,0,0,0.4); }
        .btn-gold:active { transform: translateY(6px); box-shadow: 0 2px 0 #8a6d00; }
        .btn-outline { background: #001529; color: white; border: 1px solid #00d4ff; box-shadow: 0 8px 0 #000; }
        .btn-outline:active { transform: translateY(6px); box-shadow: 0 2px 0 #000; }

        /* حقول الإدخال الاحترافية */
        input { width: 100%; padding: 16px; margin-bottom: 10px; border-radius: 15px; border: 2px solid #1a3a5a; background: #000; color: var(--blue); text-align: center; font-size: 20px; font-weight: bold; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 15px rgba(255,215,0,0.2); }

        /* شبكة الألعاب */
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; background: rgba(0,0,0,0.4); padding: 12px; border-radius: 18px; }
        .cell { width: 54px; height: 54px; background: linear-gradient(145deg, #0d253f, #1a3a5a); border: 1px solid #2a4a7a; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; box-shadow: 0 5px 0 #000; transition: 0.1s; }
        .cell:active { transform: translateY(3px); box-shadow: 0 2px 0 #000; }

        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="step-1" class="container">
        <div class="title">بوابة الوصول الآمن</div>
        <input type="password" id="mainPass" placeholder="ادخل كلمة مرور النظام">
        <button class="btn-3d btn-gold" onclick="verifyMainPass()">دخول للنظام</button>
    </div>

    <div id="step-2" class="container hidden">
        <div class="title">اختر نوع الاشتراك</div>
        <button class="btn-3d btn-outline" onclick="goToStep(3)">تجربة مجانية</button>
        <button class="btn-3d btn-gold" onclick="vipAccess()">اشتراك VIP 💎</button>
    </div>

    <div id="step-3" class="container hidden">
        <div class="title">هوية المستخدم</div>
        <p style="font-size: 14px; color: #888;">برجاء إدخال الـ ID الخاص بك للربط</p>
        <input type="text" id="playerID" placeholder="ID اللاعب">
        <button class="btn-3d btn-gold" onclick="verifyID()">ربط الحساب بالسيرفر</button>
    </div>

    <div id="step-game" class="container hidden" style="width: 350px;">
        <div class="title" style="font-size: 20px;">الرادار المطور V3</div>
        <div class="grid" id="gameGrid"></div>
        <div style="margin-top: 20px; font-weight: bold; display: flex; justify-content: space-around;">
            <span>💎: <span id="s_score" style="color:var(--blue)">0</span></span>
            <span>💣: <span id="s_bombs" style="color:red">0</span></span>
        </div>
        <button class="btn-3d btn-outline" onclick="location.reload()">إعادة المسح الذري</button>
    </div>

    <script>
        const allowedIDs = ["1658237633", "1002075"];

        function goToStep(s) {
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById('step-' + (s === 'game' ? 'game' : s)).classList.remove('hidden');
        }

        function verifyMainPass() {
            if(document.getElementById('mainPass').value === "15711") goToStep(2);
            else alert("كلمة المرور غير صحيحة");
        }

        function vipAccess() {
            let p = prompt("ادخل باسورد VIP الخاص بك:");
            if(p === "102545") initGame();
            else alert("عذراً، الباسورد غير صحيح");
        }

        function verifyID() {
            let id = document.getElementById('playerID').value;
            if(allowedIDs.includes(id)) initGame();
            else alert("هذا الـ ID غير مسجل في قاعدة بياناتنا");
        }

        function initGame() {
            goToStep('game');
            const grid = document.getElementById('gameGrid');
            const bombs = [0, 3]; // المربع 1 و 4 من اليمين في أول صف (RTL)

            for(let i=0; i<25; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => {
                    if(cell.innerHTML !== "") return;
                    if(bombs.includes(i)) {
                        cell.innerHTML = "💣"; cell.style.background = "rgba(255,0,0,0.1)";
                        document.getElementById('s_bombs').innerText = "1";
                    } else {
                        cell.innerHTML = "💎"; cell.style.background = "rgba(0,212,255,0.1)";
                        let s = document.getElementById('s_score');
                        s.innerText = parseInt(s.innerText) + 1;
                    }
                };
                grid.appendChild(cell);
            }
        }
    </script>
</body>
</html>
